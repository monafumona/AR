<!DOCTYPE html>
<html>

<head>
    <title>AR.js Marcador Personalizado</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; trackingMethod: best;"
        vr-mode-ui="enabled: false">

        <a-marker type="pattern" url="pattern-alexelcapo.patt" smooth="true" smoothCount="10" smoothTolerance="0.01"
            smoothThreshold="5">

            <a-box position="0 0.5 0" material="color: #4CC3D9; opacity: 0.9;"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
            </a-box>

            <a-text value="MANOLAZO" position="0 1 0" rotation="-90 0 0" align="center" color="#000000"
                scale="1.5 1.5 1.5">
            </a-text>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>
</body>

</html>
